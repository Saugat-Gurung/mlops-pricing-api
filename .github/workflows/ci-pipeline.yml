name: API Automated Testing

# 1. When should this robot wake up? Every time you push code to the 'main' branch.
on:
  push:
    branches: [ main ]

jobs:
  test-api:
    # 2. What kind of computer should GitHub use? A standard Linux machine.
    runs-on: ubuntu-latest

    steps:
    # 3. Download your code from your repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # 4. Install Python on the GitHub machine
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 5. Install your API requirements AND your testing tools
    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    # 6. Run the exact same test command you just ran locally!
    - name: Run Pytest
      run: |
        pytest test_api.py -v